<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin | Osies Seaside Haven</title>
  <link rel="stylesheet" href="./css/styles.css" />
  <style>
    body {
      background: #f7f7f7;
    }

    .admin-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 16px 48px;
    }
.cancel-btn {
  background:#fee4e2;
  border:1px solid #fecdca;
  color:#b42318;
  border-radius:8px;
  padding:6px 10px;
  font-weight:700;
  cursor:pointer;
}

.cancel-btn:hover {
  background:#fecdca;
}
    .admin-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,.05);
      overflow: hidden;
    }

    .admin-head {
      padding: 20px 24px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .admin-head h1 {
      margin: 0;
      font-size: 1.4rem;
    }

    .admin-head p {
      margin: 6px 0 0;
      color: #6b7280;
      font-size: .95rem;
    }
    .admin-filters {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.filter-btn {
  border: 1px solid #e5e7eb;
  background: #fff;
  color: #374151;
  border-radius: 999px;
  padding: 8px 12px;
  font-weight: 700;
  cursor: pointer;
}

.filter-btn:hover {
  background: #f9fafb;
}

.filter-btn.active {
  background: #111827;
  color: #fff;
  border-color: #111827;
}
.admin-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.clean-btn {
  background: #fff7ed;
  border: 1px solid #fed7aa;
  color: #c2410c;
  border-radius: 10px;
  padding: 8px 12px;
  font-weight: 700;
  cursor: pointer;
}

.clean-btn:hover {
  background: #ffedd5;
}

    
.status-badge.confirmed {
  background: #ecfdf3;
  color: #067647;
  border: 1px solid #abefc6;
}

.status-badge.cancelled {
  background: #fef3f2;
  color: #b42318;
  border: 1px solid #fecdca;
}

.status-badge.pending_payment {
  background: #fffaeb;
  color: #b54708;
  border-color: #fedf89;
}

.action-empty {
  color: #9ca3af;
  font-weight: 600;
}


    
    .admin-table-wrap {
      width: 100%;
      overflow-x: auto;
    }

    .admin-table {
  width: 100%;
  border-collapse: collapse;
  min-width: 1100px;
}

    .admin-table th,
    .admin-table td {
      padding: 14px 12px;
      text-align: left;
      border-bottom: 1px solid #eef0f3;
      vertical-align: top;
      font-size: .95rem;
    }

    .admin-table th {
      background: #fafafa;
      font-weight: 700;
      color: #111827;
    }

    .admin-table td {
      color: #374151;
    }

    .status-badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: .82rem;
      font-weight: 700;
      background: #ecfdf3;
      color: #067647;
      border: 1px solid #abefc6;
    }

    .status-badge.pending_payment {
      background: #fffaeb;
      color: #b54708;
      border-color: #fedf89;
    }

    .admin-empty,
    .admin-loading,
    .admin-error {
      padding: 24px;
      font-size: .98rem;
    }

    .admin-error {
      color: #b42318;
    }

    @media (max-width: 640px) {
      .admin-wrap {
        padding-top: 18px;
      }

      .admin-head h1 {
        font-size: 1.15rem;
      }
    }

    .admin-calendar-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 18px 24px 10px;
}

.admin-calendar-head h2 {
  margin: 0;
  font-size: 1.05rem;
}

.admin-calendar-head button {
  border: 1px solid #e5e7eb;
  background: #fff;
  border-radius: 10px;
  padding: 8px 12px;
  cursor: pointer;
}

.admin-calendar {
  padding: 0 24px 24px;
}

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
  gap: 8px;
}

.cal-dayname,
.cal-cell {
  border: 1px solid #e5e7eb;
  border-radius: 12px;
  background: #fff;
  min-height: 92px;
  padding: 8px;
}

.cal-dayname {
  min-height: auto;
  font-weight: 700;
  text-align: center;
  background: #fafafa;
}

.cal-cell.muted {
  opacity: .35;
}

.cal-date {
  font-size: .9rem;
  font-weight: 700;
  margin-bottom: 8px;
}

.cal-tags {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.cal-tag {
  display: inline-block;
  padding: 4px 8px;
  border-radius: 999px;
  font-size: .78rem;
  font-weight: 700;
  background: #fee4e2;
  color: #b42318;
  border: 1px solid #fecdca;
}

@media (max-width: 640px) {
  .cal-grid {
    gap: 6px;
  }

  .cal-dayname,
  .cal-cell {
    min-height: 76px;
    padding: 6px;
  }

  .cal-tag {
    font-size: .72rem;
    padding: 3px 6px;
  }
}
  </style>
</head>
<body>
  <main class="admin-wrap">
    <section class="admin-card">

      
      <div class="admin-head">
  <div>
    <h1>Panel Admin</h1>
    <p>Reservas de Osies Seaside Haven</p>
  </div>

  <div class="admin-filters">
    <button type="button" class="filter-btn active" data-filter="all">Todas</button>
    <button type="button" class="filter-btn" data-filter="confirmed">Confirmadas</button>
    <button type="button" class="filter-btn" data-filter="cancelled">Canceladas</button>
    <button type="button" class="filter-btn" data-filter="pending_payment">Pendientes</button>
  </div>
</div>
      
<div class="admin-calendar-head">
  <button id="calPrev" type="button">←</button>
  <h2 id="calTitle">Calendario</h2>
  <button id="calNext" type="button">→</button>
</div>

<div id="adminCalendar" class="admin-calendar"></div>
      <div id="adminLoading" class="admin-loading">Cargando reservas...</div>
      <div id="adminError" class="admin-error" hidden></div>
      <div id="adminEmpty" class="admin-empty" hidden>No hay reservas todavía.</div>

      <div id="adminTableWrap" class="admin-table-wrap" hidden>
        <table class="admin-table">
          <thead>
            <tr>
  <th>Confirmación</th>
  <th>Cliente</th>
  <th>Teléfono</th>
  <th>Check-in</th>
  <th>Check-out</th>
  <th>Noches</th>
  <th>Unidad</th>
  <th>Total</th>
  <th>Estado</th>
  <th>Acción</th>
</tr>
          </thead>
          <tbody id="adminTableBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="./js/admin-auth.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
  <script>
    emailjs.init("iXH3RHsJay5DQk-Zv");
  </script>
  <script type="module" src="./js/admin.js"></script>
</body>
</html>
